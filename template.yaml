AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Debt Recycler AU - Serverless Application (Lambda + API Gateway)

Parameters:
  DBHost:
    Type: String
    Description: RDS database hostname
    Default: debt-recycler-db.cf802igwerlo.ap-southeast-2.rds.amazonaws.com

  DBPort:
    Type: String
    Description: RDS database port
    Default: '5432'

  DBName:
    Type: String
    Description: Database name
    Default: debt_recycler

  DBUser:
    Type: String
    Description: Database username
    Default: postgres
    NoEcho: true

  DBPassword:
    Type: String
    Description: Database password
    NoEcho: true

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    Environment:
      Variables:
        DB_HOST: !Ref DBHost
        DB_PORT: !Ref DBPort
        DB_NAME: !Ref DBName
        DB_USER: !Ref DBUser
        DB_PASSWORD: !Ref DBPassword
        NODE_ENV: production
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Requested-With'"
      AllowOrigin: "'*'"

Resources:
  # Lambda Function - API Handler
  DebtRecyclerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: debt-recycler-api
      CodeUri: src/
      Handler: index.handler
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 512
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
              Resource: '*'
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        ApiEvents:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref ServerlessApi

  ServerlessApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: debt-recycler-api
      StageName: prod
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/{proxy+}'
          HttpMethod: ANY
          LoggingLevel: INFO
          DataTraceEnabled: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt DebtRecyclerFunction.Arn
