AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Debt Recycler AU - Serverless Application

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    Environment:
      Variables:
        DB_HOST: !GetAtt RDSInstance.Endpoint.Address
        DB_PORT: 5432
        DB_NAME: debt_recycler
        DB_USER: !Ref DBUsername
        DB_PASSWORD: !Ref DBPassword
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Parameters:
  DBUsername:
    Type: String
    NoEcho: true
    Description: RDS database username
    Default: postgres

  DBPassword:
    Type: String
    NoEcho: true
    Description: RDS database password
    MinLength: 8

Resources:
  # Lambda Function - API Handler
  DebtRecyclerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: debt-recycler-api
      CodeUri: src/
      Handler: index.handler
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 512
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
              Resource: '*'
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        ApiEvents:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  # RDS PostgreSQL Instance
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: debt-recycler-db
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15.10'
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: 20
      StorageType: gp3
      PubliclyAccessible: true
      BackupRetentionPeriod: 7
      MultiAZ: false
      EnableCloudwatchLogsExports:
        - postgresql

Outputs:
  RDSEndpoint:
    Description: RDS database endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt DebtRecyclerFunction.Arn

  ApiEndpoint:
    Description: API Gateway endpoint (check CloudFormation Outputs for ServerlessApi)
    Value: Check AWS CloudFormation stack outputs or Lambda function test event for API Gateway endpoint
