name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production

      - name: Build backend
        run: |
          mkdir -p dist
          cp -r src dist/
          cp -r node_modules dist/
          cp package*.json dist/

      - name: Build frontend
        run: |
          cd client
          npm install
          npm run build
          cd ..

      - name: Deploy with CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file template.yaml \
            --stack-name debt-recycler-au \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DBUsername=${{ secrets.DB_USERNAME }} \
              DBPassword=${{ secrets.DB_PASSWORD }} \
            --region ${{ env.AWS_REGION }}

      - name: Get stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name debt-recycler-au \
            --query 'Stacks[0].Outputs' \
            --region ${{ env.AWS_REGION }} > stack-outputs.json
          cat stack-outputs.json

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(jq -r '.[] | select(.OutputKey=="FrontendBucketName") | .OutputValue' stack-outputs.json)
          echo "Syncing frontend to S3 bucket: $BUCKET"
          aws s3 sync client/build/ s3://$BUCKET/ \
            --delete \
            --cache-control "max-age=86400" \
            --region ${{ env.AWS_REGION }}

          # Set cache-control to no-cache for index.html
          aws s3 cp client/build/index.html s3://$BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(jq -r '.[] | select(.OutputKey=="CloudFrontDistributionId") | .OutputValue' stack-outputs.json)
          echo "Invalidating CloudFront distribution: $DISTRIBUTION_ID"
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*" \
            --region ${{ env.AWS_REGION }}

  notify:
    needs: [test, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send deployment status
        uses: actions/github-script@v6
        with:
          script: |
            const status = '${{ needs.deploy.result }}';
            const message = status === 'success'
              ? '✅ Deployment successful!'
              : '❌ Deployment failed';
            console.log(message);
