AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Debt Recycler AU - Serverless Application
Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    Environment:
      Variables:
        DB_HOST:
          Fn::GetAtt:
          - RDSInstance
          - Endpoint.Address
        DB_PORT: 5432
        DB_NAME: debt_recycler
        DB_USER:
          Ref: DBUsername
        DB_PASSWORD:
          Ref: DBPassword
  Api:
    Cors:
      AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
      AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
      AllowOrigin: '''*'''
Parameters:
  DBUsername:
    Type: String
    NoEcho: true
    Description: RDS database username
    Default: postgres
  DBPassword:
    Type: String
    NoEcho: true
    Description: RDS database password
    MinLength: 8
  ACMCertificateArn:
    Type: String
    Description: ARN of ACM certificate for CloudFront (optional - use for HTTPS)
    Default: ''
Resources:
  DebtRecyclerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: debt-recycler-api
      CodeUri: s3://aws-sam-cli-managed-default-samclisourcebucket-dovlbnaiv9h1/24cbd419f0a2e37b4507c01dc945f244
      Handler: index.handler
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 512
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - logs:CreateLogGroup
          - logs:CreateLogStream
          - logs:PutLogEvents
          Resource: arn:aws:logs:*:*:*
        - Effect: Allow
          Action:
          - ec2:CreateNetworkInterface
          - ec2:DescribeNetworkInterfaces
          - ec2:DeleteNetworkInterface
          Resource: '*'
        - Effect: Allow
          Action:
          - cloudwatch:PutMetricData
          Resource: '*'
      Events:
        ApiEvents:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      SamResourceId: DebtRecyclerFunction
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: debt-recycler-db
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15.10'
      MasterUsername:
        Ref: DBUsername
      MasterUserPassword:
        Ref: DBPassword
      AllocatedStorage: 20
      StorageType: gp3
      PubliclyAccessible: true
      BackupRetentionPeriod: 7
      MultiAZ: false
      EnableCloudwatchLogsExports:
      - postgresql
    Metadata:
      SamResourceId: RDSInstance
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: debt-recycler-frontend-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
    Metadata:
      SamResourceId: FrontendBucket
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: debt-recycler-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
    Metadata:
      SamResourceId: FrontendOAC
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: FrontendDistribution
    Properties:
      Bucket:
        Ref: FrontendBucket
      PolicyText:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${FrontendBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}
    Metadata:
      SamResourceId: FrontendBucketPolicy
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Debt Recycler AU Frontend Distribution
        DefaultRootObject: index.html
        Origins:
        - Id: FrontendS3Origin
          DomainName:
            Fn::GetAtt:
            - FrontendBucket
            - RegionalDomainName
          OriginAccessControlId:
            Fn::GetAtt:
            - FrontendOAC
            - Id
        DefaultCacheBehavior:
          AllowedMethods:
          - GET
          - HEAD
          CachedMethods:
          - GET
          - HEAD
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        HttpVersion: http2
        PriceClass: PriceClass_100
    Metadata:
      SamResourceId: FrontendDistribution
Outputs:
  RDSEndpoint:
    Description: RDS database endpoint
    Value:
      Fn::GetAtt:
      - RDSInstance
      - Endpoint.Address
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value:
      Fn::GetAtt:
      - DebtRecyclerFunction
      - Arn
  ApiEndpoint:
    Description: API Gateway endpoint (check CloudFormation Outputs for ServerlessApi)
    Value: Check AWS CloudFormation stack outputs or Lambda function test event for
      API Gateway endpoint
  FrontendBucketName:
    Description: S3 bucket for frontend assets
    Value:
      Ref: FrontendBucket
  CloudFrontDistributionId:
    Description: CloudFront distribution ID for cache invalidation
    Value:
      Ref: FrontendDistribution
  CloudFrontURL:
    Description: CloudFront distribution URL (HTTPS)
    Value:
      Fn::Sub: https://${FrontendDistribution.DomainName}
